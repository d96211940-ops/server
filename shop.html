<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Магазин</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Навигация -->
  <nav class="nav-header">
    <div class="nav-left">
      <a href="server.html" class="nav-btn nav-btn-profile">🏠 Назад</a>
    </div>
    <div class="nav-right">
      <button class="nav-btn nav-btn-logout" onclick="logout()">🚪 Выход</button>
    </div>
  </nav>

  <div class="page-container">
    <h1 class="page-title">🛒 Магазин Предметов</h1>

    <div class="shop-grid" id="shopGrid">
      <!-- Товары будут загружены через JS -->
    </div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { 
      getAuth, 
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { 
      getDatabase, 
      ref, 
      get,
      update,
      push
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCTlre_qCkP2fb7ktutahls84h_FwDcKUs",
      authDomain: "igra-sait.firebaseapp.com",
      projectId: "igra-sait",
      storageBucket: "igra-sait.firebasestorage.app",
      messagingSenderId: "693199535341",
      appId: "1:693199535341:web:e126bf76cbb214776e20e4",
      measurementId: "G-X469ETJYEE"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // Товары магазина
    const shopItems = [
      { id: 'avatar_1', name: 'Золотая Рамка', icon: '🖼️', price: 50, type: 'avatar' },
      { id: 'avatar_2', name: 'Серебряная Рамка', icon: '🏅', price: 30, type: 'avatar' },
      { id: 'emote_1', name: 'Смайлик 😎', icon: '😎', price: 20, type: 'emote' },
      { id: 'emote_2', name: 'Смайлик 🤩', icon: '🤩', price: 25, type: 'emote' },
      { id: 'emote_3', name: 'Смайлик 🥳', icon: '🥳', price: 25, type: 'emote' },
      { id: 'badge_1', name: 'Значок Новичка', icon: '📛', price: 15, type: 'badge' },
      { id: 'badge_2', name: 'Значок Мастера', icon: '🎖️', price: 100, type: 'badge' },
      { id: 'badge_3', name: 'Значок Легенды', icon: '👑', price: 250, type: 'badge' },
      { id: 'effect_1', name: 'Огненный След', icon: '🔥', price: 75, type: 'effect' },
      { id: 'effect_2', name: 'Ледяной След', icon: '❄️', price: 75, type: 'effect' },
      { id: 'pet_1', name: 'Мини-Дракон', icon: '🐉', price: 150, type: 'pet' },
      { id: 'pet_2', name: 'Феникс', icon: '🦅', price: 200, type: 'pet' },
    ];

    let currentUser = null;
    let userData = null;

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = 'index.html';
        return;
      }

      currentUser = user;
      try {
        const snapshot = await get(ref(db, 'users/' + user.uid));
        if (snapshot.exists()) {
          userData = snapshot.val();
        }
        renderShop();
      } catch (error) {
        console.error('Ошибка загрузки данных:', error);
      }
    });

    function renderShop() {
      const shopGrid = document.getElementById('shopGrid');
      const userCoins = userData?.gameStats?.coins || 0;
      const userInventory = userData?.inventory || {};

      shopGrid.innerHTML = '';
      
      shopItems.forEach(item => {
        const isOwned = userInventory[item.id] !== undefined;
        const canAfford = userCoins >= item.price;

        const itemEl = document.createElement('div');
        itemEl.className = 'shop-item';
        itemEl.innerHTML = `
          <div class="shop-item-icon">${item.icon}</div>
          <div class="shop-item-name">${item.name}</div>
          <div class="shop-item-price">${isOwned ? '✅ Куплено' : '💰 ' + item.price}</div>
          <button class="btn-buy" 
            ${isOwned ? 'disabled' : ''} 
            ${!canAfford && !isOwned ? 'disabled' : ''}
            onclick="buyItem('${item.id}')">
            ${isOwned ? 'В инвентаре' : (canAfford ? 'Купить' : 'Не хватает монет')}
          </button>
        `;
        shopGrid.appendChild(itemEl);
      });
    }

    window.buyItem = async function(itemId) {
      if (!currentUser || !userData) return;

      const item = shopItems.find(i => i.id === itemId);
      if (!item) return;

      const userCoins = userData.gameStats.coins || 0;
      if (userCoins < item.price) {
        alert('Недостаточно монет!');
        return;
      }

      try {
        // Обновляем монеты и добавляем предмет в инвентарь
        const updates = {};
        updates['users/' + currentUser.uid + '/gameStats/coins'] = userCoins - item.price;
        updates['users/' + currentUser.uid + '/inventory/' + itemId] = {
          name: item.name,
          icon: item.icon,
          type: item.type,
          purchasedAt: Date.now()
        };

        await update(ref(db), updates);
        
        // Обновляем локальные данные
        userData.gameStats.coins = userCoins - item.price;
        if (!userData.inventory) userData.inventory = {};
        userData.inventory[itemId] = { name: item.name, icon: item.icon, type: item.type };

        renderShop();
        alert('Предмет "' + item.name + '" успешно куплен!');
      } catch (error) {
        console.error('Ошибка покупки:', error);
        alert('Ошибка при покупке предмета');
      }
    };

    window.logout = async function() {
      try {
        await signOut(auth);
        window.location.href = 'index.html';
      } catch (error) {
        console.error('Ошибка выхода:', error);
      }
    };
  </script>
</body>
</html>
