<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Рейтинг</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Навигация -->
  <nav class="nav-header">
    <div class="nav-left">
      <a href="server.html" class="nav-btn nav-btn-profile">🏠 Назад</a>
    </div>
    <div class="nav-right">
      <button class="nav-btn nav-btn-logout" onclick="logout()">🚪 Выход</button>
    </div>
  </nav>

  <div class="page-container">
    <h1 class="page-title">🏆 Рейтинг Игроков</h1>

    <div class="rating-table">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Игрок</th>
            <th>Уровень</th>
            <th>Опыт</th>
            <th>Монеты</th>
          </tr>
        </thead>
        <tbody id="ratingBody">
          <tr>
            <td colspan="5" style="text-align: center; padding: 40px;">Загрузка...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { 
      getAuth, 
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { 
      getDatabase, 
      ref, 
      get
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCTlre_qCkP2fb7ktutahls84h_FwDcKUs",
      authDomain: "igra-sait.firebaseapp.com",
      projectId: "igra-sait",
      storageBucket: "igra-sait.firebasestorage.app",
      messagingSenderId: "693199535341",
      appId: "1:693199535341:web:e126bf76cbb214776e20e4",
      measurementId: "G-X469ETJYEE"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    async function loadRating() {
      try {
        const snapshot = await get(ref(db, 'users'));
        const ratingBody = document.getElementById('ratingBody');
        
        if (!snapshot.exists()) {
          ratingBody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 40px;">Пока нет игроков</td></tr>';
          return;
        }

        const users = [];
        snapshot.forEach((childSnapshot) => {
          const data = childSnapshot.val();
          users.push({
            uid: childSnapshot.key,
            name: data.profile?.name || 'Аноним',
            level: data.gameStats?.level || 1,
            experience: data.gameStats?.experience || 0,
            coins: data.gameStats?.coins || 0
          });
        });

        // Сортировка по опыту (убывание)
        users.sort((a, b) => b.experience - a.experience);

        ratingBody.innerHTML = '';
        users.forEach((user, index) => {
          const rankClass = index < 3 ? `rank-${index + 1}` : '';
          const row = `
            <tr>
              <td class="rank ${rankClass}">${index + 1}</td>
              <td>${user.name}</td>
              <td>${user.level}</td>
              <td>${user.experience}</td>
              <td>${user.coins}</td>
            </tr>
          `;
          ratingBody.innerHTML += row;
        });

      } catch (error) {
        console.error('Ошибка загрузки рейтинга:', error);
        document.getElementById('ratingBody').innerHTML = 
          '<tr><td colspan="5" style="text-align: center; padding: 40px; color: red;">Ошибка загрузки</td></tr>';
      }
    }

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = 'index.html';
        return;
      }
      loadRating();
    });

    window.logout = async function() {
      try {
        await signOut(auth);
        window.location.href = 'index.html';
      } catch (error) {
        console.error('Ошибка выхода:', error);
      }
    };
  </script>
</body>
</html>
