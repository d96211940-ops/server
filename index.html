<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Игра - Регистрация и Вход</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="auth-box">
      <h1>🎮 Игра</h1>
      <p class="subtitle">Добро пожаловать в игровой мир</p>

      <div id="alert" class="alert"></div>

      <!-- Форма регистрации -->
      <div id="registerForm" class="form-container active">
        <form id="register">
          <div class="form-group">
            <label for="registerName">Никнейм</label>
            <input type="text" id="registerName" placeholder="Введите ник (4-10 символов)" minlength="4" maxlength="10" required>
            <div class="nickname-status loading" id="nicknameStatus">Проверка...</div>
            <div class="error-message" id="registerNameError"></div>
          </div>

          <div class="form-group">
            <label for="registerEmail">Email</label>
            <input type="email" id="registerEmail" placeholder="Введите email" required>
            <div class="error-message" id="registerEmailError"></div>
          </div>

          <div class="form-group">
            <label for="registerPassword">Пароль</label>
            <input type="password" id="registerPassword" placeholder="Минимум 6 символов" minlength="6" required>
            <div class="error-message" id="registerPasswordError"></div>
          </div>

          <div class="form-group">
            <label for="registerConfirmPassword">Подтвердите пароль</label>
            <input type="password" id="registerConfirmPassword" placeholder="Повторите пароль" required>
            <div class="error-message" id="registerConfirmError"></div>
          </div>

          <button type="submit" class="btn btn-primary" id="registerBtn">Зарегистрироваться</button>
        </form>

        <p class="toggle-text">
          Уже есть аккаунт? <a onclick="showLogin()">Войти</a>
        </p>
      </div>

      <!-- Форма входа -->
      <div id="loginForm" class="form-container">
        <form id="login">
          <div class="form-group">
            <label for="loginEmail">Email</label>
            <input type="email" id="loginEmail" placeholder="Введите email" required>
            <div class="error-message" id="loginEmailError"></div>
          </div>

          <div class="form-group">
            <label for="loginPassword">Пароль</label>
            <input type="password" id="loginPassword" placeholder="Введите пароль" required>
            <div class="error-message" id="loginPasswordError"></div>
          </div>

          <button type="submit" class="btn btn-primary">Войти</button>
        </form>

        <p class="toggle-text">
          Нет аккаунта? <a onclick="showRegister()">Зарегистрироваться</a>
        </p>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { 
      getAuth, 
      createUserWithEmailAndPassword, 
      signInWithEmailAndPassword,
      updateProfile,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { 
      getDatabase, 
      ref, 
      set,
      get,
      serverTimestamp,
      query,
      orderByChild,
      equalTo
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // Конфигурация Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyDD59DH5qa09g4puzlQYbQ88JpZmfSnL1Y",
      authDomain: "new-server-b6c15.firebaseapp.com",
      projectId: "new-server-b6c15",
      storageBucket: "new-server-b6c15.firebasestorage.app",
      messagingSenderId: "852439668655",
      appId: "1:852439668655:web:6b1cb198324507a9cc015a",
      measurementId: "G-F6N9XR9VN7"
    };

    // Инициализация Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // Проверка состояния аутентификации
    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = 'server.html';
      }
    });

    // Переключение между формами
    window.showLogin = function() {
      document.getElementById('registerForm').classList.remove('active');
      document.getElementById('loginForm').classList.add('active');
      hideAlert();
      clearErrors();
    };

    window.showRegister = function() {
      document.getElementById('loginForm').classList.remove('active');
      document.getElementById('registerForm').classList.add('active');
      hideAlert();
      clearErrors();
    };

    // Показать сообщение
    function showAlert(message, type) {
      const alert = document.getElementById('alert');
      alert.textContent = message;
      alert.className = 'alert show ' + (type === 'success' ? 'alert-success' : 'alert-error');
    }

    function hideAlert() {
      const alert = document.getElementById('alert');
      alert.className = 'alert';
    }

    // Очистка ошибок
    function clearErrors() {
      document.querySelectorAll('.error-message').forEach(el => {
        el.textContent = '';
        el.classList.remove('show');
      });
      document.querySelectorAll('input').forEach(el => {
        el.classList.remove('error', 'success');
      });
    }

    // Показать ошибку в поле
    function showFieldError(fieldId, messageId, message) {
      const field = document.getElementById(fieldId);
      const errorEl = document.getElementById(messageId);
      field.classList.add('error');
      errorEl.textContent = message;
      errorEl.classList.add('show');
    }

    // Валидация имени
    function validateName(name) {
      if (!name || name.trim() === '') {
        return 'Имя не может быть пустым';
      }
      if (name.length < 4 || name.length > 10) {
        return 'Имя должно быть от 4 до 10 символов';
      }
      return null;
    }

    // Валидация пароля
    function validatePassword(password) {
      if (!password || password.length < 6) {
        return 'Пароль должен быть минимум 6 символов';
      }
      return null;
    }

    // Генерация уникального ID (10 цифр)
    function generatePlayerId() {
      let id = '';
      for (let i = 0; i < 10; i++) {
        id += Math.floor(Math.random() * 10);
      }
      return id;
    }

    // Проверка ника на уникальность
    async function isNicknameUnique(nickname) {
      try {
        // Используем toLowerCase() для поиска, чтобы соответствовать формату хранения
        const snapshot = await get(query(ref(db, 'users'), orderByChild('profile/nickname'), equalTo(nickname.toLowerCase())));
        return !snapshot.exists();
      } catch (error) {
        console.error('Ошибка проверки ника:', error);
        return false; // При ошибке считаем, что ник занят (для безопасности)
      }
    }

    // Проверка ника при вводе
    let nicknameTimeout;
    document.getElementById('registerName').addEventListener('input', function(e) {
      const nickname = e.target.value.trim();
      const statusEl = document.getElementById('nicknameStatus');
      
      clearTimeout(nicknameTimeout);
      
      if (nickname.length < 4) {
        statusEl.className = 'nickname-status';
        return;
      }
      
      statusEl.className = 'nickname-status show loading';
      statusEl.textContent = 'Проверка...';
      
      nicknameTimeout = setTimeout(async () => {
        const isUnique = await isNicknameUnique(nickname);
        if (isUnique) {
          statusEl.className = 'nickname-status show valid';
          statusEl.textContent = '✓ Ник свободен';
        } else {
          statusEl.className = 'nickname-status show invalid';
          statusEl.textContent = '✗ Ник занят';
        }
      }, 500);
    });

    // Регистрация
    document.getElementById('register').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErrors();
      hideAlert();

      const name = document.getElementById('registerName').value.trim();
      const email = document.getElementById('registerEmail').value.trim();
      const password = document.getElementById('registerPassword').value;
      const confirmPassword = document.getElementById('registerConfirmPassword').value;

      let hasError = false;

      // Валидация имени
      const nameError = validateName(name);
      if (nameError) {
        showFieldError('registerName', 'registerNameError', nameError);
        hasError = true;
      }

      // Валидация email
      if (!email || !email.includes('@')) {
        showFieldError('registerEmail', 'registerEmailError', 'Введите корректный email');
        hasError = true;
      }

      // Валидация пароля
      const passwordError = validatePassword(password);
      if (passwordError) {
        showFieldError('registerPassword', 'registerPasswordError', passwordError);
        hasError = true;
      }

      // Проверка совпадения паролей
      if (password !== confirmPassword) {
        showFieldError('registerConfirmPassword', 'registerConfirmError', 'Пароли не совпадают');
        hasError = true;
      }

      if (hasError) return;

      // Проверка ника на уникальность
      const isUnique = await isNicknameUnique(name);
      if (!isUnique) {
        showFieldError('registerName', 'registerNameError', 'Этот ник уже занят');
        return;
      }

      try {
        const registerBtn = document.getElementById('registerBtn');
        registerBtn.disabled = true;
        registerBtn.textContent = 'Регистрация...';

        // Создание пользователя в Firebase Auth
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // Генерация уникального ID
        const playerId = generatePlayerId();

        // Обновление профиля с именем
        await updateProfile(user, {
          displayName: name
        });

        // Создание записи в Realtime Database
        const userData = {
          profile: {
            nickname: name.toLowerCase(),
            displayName: name,
            email: email,
            playerId: playerId,
            registeredAt: serverTimestamp(),
            lastLogin: serverTimestamp()
          },
          gameStats: {
            level: 1,
            experience: 0,
            coins: 100,
            gamesPlayed: 0
          },
          settings: {
            sound: true,
            music: true
          },
          inventory: {}
        };

        await set(ref(db, 'users/' + user.uid), userData);
        console.log('Данные записаны для пользователя:', user.uid);
        console.log('Player ID:', playerId);

        showAlert('Регистрация успешна! Перенаправление...', 'success');
        
        setTimeout(() => {
          window.location.href = 'server.html';
        }, 2000);

      } catch (error) {
        console.error('Ошибка регистрации:', error);
        let errorMessage = 'Ошибка регистрации';
        
        switch (error.code) {
          case 'auth/email-already-in-use':
            errorMessage = 'Email уже зарегистрирован';
            break;
          case 'auth/invalid-email':
            errorMessage = 'Некорректный email';
            break;
          case 'auth/weak-password':
            errorMessage = 'Пароль слишком слабый';
            break;
          default:
            errorMessage = error.message;
        }
        
        showAlert(errorMessage, 'error');
        document.getElementById('registerBtn').disabled = false;
        document.getElementById('registerBtn').textContent = 'Зарегистрироваться';
      }
    });

    // Вход
    document.getElementById('login').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErrors();
      hideAlert();

      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      let hasError = false;

      if (!email || !email.includes('@')) {
        showFieldError('loginEmail', 'loginEmailError', 'Введите корректный email');
        hasError = true;
      }

      if (!password) {
        showFieldError('loginPassword', 'loginPasswordError', 'Введите пароль');
        hasError = true;
      }

      if (hasError) return;

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // Обновление lastLogin в базе данных
        await set(ref(db, 'users/' + user.uid + '/profile/lastLogin'), serverTimestamp());

        showAlert('Вход успешен! Перенаправление...', 'success');
        
        setTimeout(() => {
          window.location.href = 'server.html';
        }, 1500);

      } catch (error) {
        console.error('Ошибка входа:', error);
        let errorMessage = 'Ошибка входа';
        
        switch (error.code) {
          case 'auth/user-not-found':
            errorMessage = 'Пользователь не найден';
            break;
          case 'auth/wrong-password':
            errorMessage = 'Неверный пароль';
            break;
          case 'auth/invalid-email':
            errorMessage = 'Некорректный email';
            break;
          default:
            errorMessage = error.message;
        }
        
        showAlert(errorMessage, 'error');
      }
    });
  </script>
</body>
</html>
