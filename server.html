<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Игра - Главная</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Навигация -->
  <nav class="nav-header">
    <div class="nav-left">
      <a href="../profile/profil.html" class="nav-btn nav-btn-profile">👤 Профиль</a>
    </div>
    <div class="nav-right">
      <button class="nav-btn nav-btn-logout" onclick="logout()">🚪 Выход</button>
    </div>
  </nav>

  <!-- Центральные кнопки -->
  <div class="nav-center">
    <a href="../rating/rating.html" class="nav-btn-main nav-btn-rating">🏆 Рейтинг</a>
    <a href="../games/irga-list.html" class="nav-btn-main nav-btn-games">🎮 Игры</a>
    <a href="../shop/shop.html" class="nav-btn-main nav-btn-shop">🛒 Магазин</a>
  </div>

  <!-- Статистика пользователя -->
  <div class="user-stats">
    <p>👤 <span id="userName">Загрузка...</span></p>
    <p>⭐ Уровень: <span id="userLevel">1</span></p>
    <p>💰 Монеты: <span id="userCoins">100</span></p>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { 
      getAuth, 
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { 
      getDatabase, 
      ref, 
      get
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDD59DH5qa09g4puzlQYbQ88JpZmfSnL1Y",
      authDomain: "new-server-b6c15.firebaseapp.com",
      projectId: "new-server-b6c15",
      storageBucket: "new-server-b6c15.firebasestorage.app",
      messagingSenderId: "852439668655",
      appId: "1:852439668655:web:6b1cb198324507a9cc015a",
      measurementId: "G-F6N9XR9VN7"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = '../index.html';
        return;
      }

      try {
        const snapshot = await get(ref(db, 'users/' + user.uid));
        if (snapshot.exists()) {
          const data = snapshot.val();
          document.getElementById('userName').textContent = data.profile.displayName;
          document.getElementById('userLevel').textContent = data.gameStats.level;
          document.getElementById('userCoins').textContent = data.gameStats.coins;
        }
      } catch (error) {
        console.error('Ошибка загрузки данных:', error);
      }
    });

    window.logout = async function() {
      try {
        await signOut(auth);
        window.location.href = '../index.html';
      } catch (error) {
        console.error('Ошибка выхода:', error);
      }
    };
  </script>
</body>
</html>
